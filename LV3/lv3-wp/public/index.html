<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <title>LV3 - Glazba</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
<header>
    <div class="header-container">
        <h1>Uživaj u glazbi!</h1>
        <button onclick="document.getElementById('sekcijaKosarica').classList.toggle('otvoreno')">
            Prikaži košaricu
        </button>
    </div>
</header>
 
<div id="filteri">
    <input type="text" id="Naslov" placeholder="Pretraži po naslovu...">
	<input type="text" id="Izvođač" placeholder="Pretraži po izvođaču...">
 
    <select id="filterZanr">
        <option value="">Svi žanrovi</option>
        <option value="Rock">Rock</option>
		<option value="Hard Rock">Hard Rock</option>
		<option value="Soft Rock">Soft Rock</option>
		<option value="Indie Rock">Indie Rock</option>
		<option value="Funk Rock">Funk Rock</option>
		<option value="Garage Rock">Garage Rock</option>
        <option value="Pop">Pop</option>
		<option value="Electropop">Electropop</option>
		<option value="Disco-Pop">Disco-Pop</option>
        <option value="Jazz">Jazz</option>
        <option value="Hip Hop">Hip Hop</option>
		<option value="Synthwave">Synthwave</option>
		<option value="Grunge">Grunge</option>
		<option value="Nu Metal">Nu Metal</option>
		<option value="Thrash Metal">Thrash Metal</option>
		<option value="Funk">Funk</option>
		<option value="Soul">Soul</option>
		<option value="House">House</option>
		<option value="R&B">R&B</option>
		<option value="EDM">EDM</option>
    </select>
 
	<label>Godina (min: <span id="godinaVrijednost">1950</span>): 
		<input type="range" id="Godina" min="1950" max="2026" value="1950" 
			oninput="document.getElementById('godinaVrijednost').innerText = this.value; primijeniFiltere();">
	</label>
</div>
 
    <table border="1" id="tablicaFilmova" style="width: 100%; text-align: left;">
        <thead>
            <tr id="headRow"></tr>
        </thead>
        <tbody id="bodyTable"></tbody>
    </table>
 
	<div class="main-wrapper" style="display: flex; gap: 20px; padding: 20px;">
		<div style="flex: 3;">
			<table border="1" id="tablicaFilmova" style="width: 100%;">
				<thead><tr id="headRow"></tr></thead>
				<tbody id="bodyTable"></tbody>
			</table>
		</div>

		<aside id="sekcijaKosarica" style="flex: 1; background: #161b22; padding: 20px; border-radius: 8px; border: 1px solid #00d4ff;">
			<h2>Moja košarica (<span id="brojStavki">0</span>)</h2>
			<ul id="listaKosarica" style="list-style: none; padding: 0;"></ul>
			<button id="btnPotvrdi" onclick="potvrdiPosudbu()">Potvrdi odabir</button>
			<div id="mojePotvrdenePjesme" style="margin-top: 20px; border-top: 1px dashed #00d4ff; padding-top: 10px;">
				<h3>Moja Playlista (Potvrđeno)</h3>
				<ul id="listaKonacno"></ul>
			</div>
		</aside>
	</div>
    <script src="scripts.js"></script>
</body>
</html>
